  <g stroke="white" stroke-opacity="0.72" stroke-linecap="round">
    <path d="M150 73 L135 70" stroke-width="2.4"/>
    <path d="M151 77 L132 87" stroke-width="2.1"/>
    <path d="M154 81 L137 104" stroke-width="2"/>
    <path d="M160 83 L157 112" stroke-width="1.9"/>
    <path d="M166 82 L176 110" stroke-width="1.9"/>
    <path d="M171 79 L189 97" stroke-width="1.8"/>
