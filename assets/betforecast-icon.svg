<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldFill" x1="56" y1="26" x2="196" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BAFFE7"/>
      <stop offset="0.35" stop-color="#56E8AE"/>
      <stop offset="1" stop-color="#0F6A48"/>
    </linearGradient>

    <linearGradient id="shine" x1="70" y1="38" x2="150" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.52"/>
