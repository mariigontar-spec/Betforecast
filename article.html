<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | Betforecast.ai</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="site-logo" href="index.html" aria-label="Betforecast.ai home">
        <img
          class="site-logo__icon"
          src="assets/bet-logo.png"
          alt="Betforecast.ai logo"
        >
     <a class="bf-logo" href="index.html" aria-label="Betforecast.ai home">
  <img src="assets/bet-logo.png" alt="Betforecast.ai logo">
  <span>Betforecast<span>.ai</span></span>
</a>
      </a>

      <nav class="topbar-menu" aria-label="Main navigation">
        <a href="news.html" class="active">News</a>
        <a href="standings.html">Standings</a>
        <a href="match.html">Matches</a>
        <a href="results.html">Results</a>
        <a href="ai-insights.html">AI Insights</a>
      </nav>

      <div class="topbar-actions">
        <button class="theme-switch" id="theme-toggle" type="button" aria-label="Toggle theme">
  <span class="theme-switch-track">
    <span class="theme-switch-thumb"></span>
  </span>
  <span class="theme-switch-label">Glass</span>
</button>
        <a href="#" class="btn-bf-ghost">Sign In</a>
      </div>
    </div>
  </header>

  <main class="article-page-wrap page-shell">
    <section class="article-hero panel">
      <a href="news.html" class="article-back-btn">← Back to News</a>

      <div class="article-hero-head">
        <span class="news-category" id="article-category">News</span>

        <div class="news-meta">
          <span id="article-time">Now</span>
          <span> • </span>
          <span id="article-readtime">4 min read</span>
        </div>
      </div>

      <h1 id="article-title">Loading article...</h1>

      <p class="article-subtitle" id="article-excerpt">
        Please wait while the article is loading.
      </p>
    </section>

    <section class="article-layout">
      <div class="article-main-column">
        <section class="panel article-main">
          <img
            id="article-image"
            class="article-main-image"
            src="assets/news/arsenal.jpg"
            alt="Article image"
          >

          <div class="article-content" id="article-content">
            <p>Loading content...</p>
          </div>
        </section>
      </div>

      <aside class="article-sidebar">
        <section class="panel side-block">
          <div class="panel-head">
            <h2>AI Insight</h2>
          </div>

          <div class="article-insight-box">
            <span class="article-insight-kicker">Model Reading</span>
            <h3>Why this matters</h3>
            <p id="article-insight-text">
              Loading insight...
            </p>
          </div>
        </section>

        <section class="panel side-block">
          <div class="panel-head">
            <h2>Related News</h2>
          </div>

          <div class="related-news-list" id="related-news-list"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="js/article.js"></script>

  <script>
    (function () {
      const savedTheme = localStorage.getItem("bf-theme") || "light";

document.body.classList.remove("theme-dark", "theme-glass", "theme-light");
document.body.classList.add(`theme-${savedTheme}`);

      const toggle = document.getElementById("theme-toggle");
      const label = toggle ? toggle.querySelector(".theme-switch-label") : null;

      function updateLabel(theme) {
        if (!label) return;
        label.textContent = theme === "dark" ? "Dark" : "Glass";
      }

      updateLabel(savedTheme);

      if (toggle) {
        toggle.addEventListener("click", function () {
          const nextTheme = document.body.classList.contains("theme-dark") ? "glass" : "dark";

          document.body.classList.remove("theme-dark", "theme-glass");
          document.body.classList.add(`theme-${nextTheme}`);

          localStorage.setItem("bf-theme", nextTheme);
          updateLabel(nextTheme);
        });
      }
    })();
  </script>
  
</body>
</html>
