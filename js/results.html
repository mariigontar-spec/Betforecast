<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Betforecast.ai | World Cup 2026 Results</title>

  <link rel="stylesheet" href="css/style.css?v=21">

  <script
    src="https://cdn.counter.dev/script.js"
    data-id="1a42378c-7a8a-4f3e-8296-a7a9f8655098"
    data-utcoffset="3">
  </script>

  <style>
    /* =========================================================
       RESULTS PAGE LOCAL FIX
       Keeps this page safe without touching global style.css
       ========================================================= */

    .results-page-wrap {
      width: min(1280px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
      display: grid;
      gap: 24px;
    }

    .results-hero {
      width: min(1040px, 100%);
      margin: 0 auto;
    }

    .results-page-section {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 22px;
      border-radius: 24px;
      background:
        linear-gradient(
          180deg,
          rgba(18, 38, 55, 0.94),
          rgba(6, 17, 27, 0.97)
        );
      border: 1px solid rgba(94, 224, 164, 0.16);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .results-head h2 {
      margin: 0;
      color: var(--text-main);
      font-size: 28px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    .results-head span {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.4;
      text-align: right;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .result-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 300px;
      padding: 22px;
      border-radius: 22px;
      overflow: hidden;
      color: var(--text-main);
      background:
        radial-gradient(
          circle at 50% 25%,
          rgba(94, 224, 164, 0.09),
          transparent 38%
        ),
        linear-gradient(
          180deg,
          rgba(18, 38, 55, 0.98),
          rgba(7, 19, 31, 0.99)
        );
      border: 1px solid rgba(94, 224, 164, 0.18);
      box-shadow:
        0 12px 34px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      text-decoration: none;
      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .result-card:hover {
      transform: translateY(-3px);
      border-color: rgba(94, 224, 164, 0.36);
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.32),
        0 0 28px rgba(94, 224, 164, 0.12);
    }

    .result-card-top,
    .result-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .result-card-top {
      margin-bottom: 30px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 800;
    }

    .result-round {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      color: #f8fafc;
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .result-teams {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      margin: auto 0 30px;
    }

    .result-team {
      display: grid;
      justify-items: center;
      gap: 10px;
      text-align: center;
      min-width: 0;
    }

    .result-team img,
    .result-logo-placeholder {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.08);
      padding: 7px;
    }

    .result-logo-placeholder {
      display: block;
    }

    .result-team h3 {
      max-width: 100%;
      margin: 0;
      color: var(--text-main);
      font-size: 16px;
      line-height: 1.2;
      font-weight: 900;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .result-score {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-main);
      font-size: 34px;
      line-height: 1;
      font-weight: 950;
      white-space: nowrap;
    }

    .result-score span {
      color: var(--text-soft);
    }

    .result-card-bottom {
      margin-top: auto;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.35;
    }

    .result-card-bottom span:last-child {
      text-align: right;
    }

    .results-empty {
      grid-column: 1 / -1;
      padding: 24px;
      border-radius: 20px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(94, 224, 164, 0.18);
      line-height: 1.55;
    }

    @media (max-width: 1100px) {
      .results-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .results-page-wrap {
        width: calc(100% - 16px);
        padding: 18px 0 44px;
      }

      .results-page-section {
        padding: 16px 12px;
      }

      .results-head {
        flex-direction: column;
      }

      .results-head span {
        text-align: left;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .result-card {
        min-height: 260px;
        padding: 18px;
      }

      .result-score {
        font-size: 28px;
      }

      .result-team img,
      .result-logo-placeholder {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>

<body class="theme-dark">

<header class="header">
  <div class="header-inner">

    <a class="bf-logo" href="index.html" aria-label="Betforecast.ai home">
      <img src="assets/bet-logo.png" alt="Betforecast.ai logo">
      <span>Betforecast<span>.ai</span></span>
    </a>

    <nav class="topbar-menu" aria-label="Main navigation">
      <a href="world-cup-2026.html">🏆 WC 2026</a>
      <a href="news.html">News</a>
      <a href="standings.html">Standings</a>
      <a href="match.html">Matches</a>
      <a href="results.html" class="active">Results</a>
      <a href="ai-insights.html">AI Insights</a>
    </nav>

    <div class="topbar-actions">

      <button
        class="theme-switch"
        id="theme-toggle"
        type="button"
        aria-label="Toggle theme">

        <span class="theme-switch-track">
          <span class="theme-switch-thumb"></span>
        </span>

        <span class="theme-switch-label">Dark</span>
      </button>

    </div>
  </div>
</header>

<main class="results-page-wrap">

  <section class="ai-focus-banner ai-focus-banner-compact results-hero">

    <div class="ai-focus-content">

      <div class="ai-focus-text">

        <span class="hero-ai-badge">
          World Cup Results
        </span>

        <h1>
          Latest World Cup 2026 results.
        </h1>

        <p>
          Follow final scores, recent outcomes,
          and team results from the FIFA World Cup 2026.
        </p>

      </div>

    </div>

  </section>

  <section class="results-page-section">

    <div class="results-head">

      <h2>
        World Cup Match Results
      </h2>

      <span id="results-status">
        Loading World Cup results...
      </span>

    </div>

    <div
      id="results-grid"
      class="results-grid">
    </div>

  </section>

</main>

<script src="/api-config.js"></script>
<script src="/js/results.js?v=2"></script>

<script>
(function () {

  const body = document.body;

  const toggle =
    document.getElementById("theme-toggle");

  const label =
    toggle
    ? toggle.querySelector(".theme-switch-label")
    : null;

  function applyTheme(theme) {

    body.classList.remove(
      "theme-dark",
      "theme-glass",
      "theme-light"
    );

    if (theme === "glass") {
      body.classList.add("theme-glass");
    } else {
      body.classList.add("theme-dark");
    }

    localStorage.setItem("bf-theme", theme);

    if (label) {
      label.textContent =
        theme === "glass"
        ? "Glass"
        : "Dark";
    }
  }

  const savedTheme =
    localStorage.getItem("bf-theme") || "dark";

  applyTheme(savedTheme);

  if (toggle) {

    toggle.addEventListener("click", function () {

      const nextTheme =
        body.classList.contains("theme-dark")
        ? "glass"
        : "dark";

      applyTheme(nextTheme);

    });
  }

})();
</script>

</body>
</html>
