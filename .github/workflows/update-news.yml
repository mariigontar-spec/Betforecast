name: Update cached news

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update news cache
        run: node scripts/update-news.js

      - name: Commit updated news cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update cached news data"
          file_pattern: data/news.json
