  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const resultsContainer =
        document.getElementById("results-page-container");

      if (!resultsContainer) {
        return;
      }

      const cardSelector =
        ".match-card, " +
        "article, " +
        ".result-card, " +
        ".results-card, " +
        ".match-result-card";

      function makeCardsInteractive() {
        const cards =
          resultsContainer.querySelectorAll(cardSelector);

        cards.forEach(function (card) {
          card.style.cursor = "pointer";
          card.setAttribute("tabindex", "0");
          card.setAttribute("role", "button");
          card.setAttribute(
            "aria-label",
            "Open match analysis"
          );
        });
      }

      resultsContainer.addEventListener(
        "click",
        function (event) {
          const card = event.target.closest(cardSelector);

          if (
            !card ||
            !resultsContainer.contains(card)
          ) {
            return;
          }

          window.location.href = "match.html";
        }
      );

      resultsContainer.addEventListener(
        "keydown",
        function (event) {
          if (
            event.key !== "Enter" &&
            event.key !== " "
          ) {
            return;
          }

          const card = event.target.closest(cardSelector);

          if (
            !card ||
            !resultsContainer.contains(card)
          ) {
            return;
          }

          event.preventDefault();
          window.location.href = "match.html";
        }
      );

      makeCardsInteractive();

      const observer =
        new MutationObserver(makeCardsInteractive);

      observer.observe(resultsContainer, {
        childList: true,
        subtree: true
      });
    });
  </script>
