<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betforecast.ai | World Cup 2026 Results</title>

  <link rel="stylesheet" href="css/style.css?v=22">

  <script
    src="https://cdn.counter.dev/script.js"
    data-id="1a42378c-7a8a-4f3e-8296-a7a9f8655098"
    data-utcoffset="3">
  </script>

  <style>
    .results-page-wrap {
      width: min(1280px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
      display: grid;
      gap: 24px;
    }

    .results-hero,
    .results-page-section {
      width: min(1040px, 100%);
      margin: 0 auto;
    }

    .results-page-section {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(18, 38, 55, 0.94), rgba(6, 17, 27, 0.97));
      border: 1px solid rgba(94, 224, 164, 0.16);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .results-head h2 {
      margin: 0;
      color: var(--text-main);
      font-size: 28px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    .results-head span {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.4;
      text-align: right;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .result-card,
    .result-card * {
      writing-mode: horizontal-tb !important;
      text-orientation: mixed !important;
      word-break: normal !important;
      overflow-wrap: normal !important;
      hyphens: none !important;
      box-sizing: border-box;
    }

    .result-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 232px;
      padding: 18px;
      border-radius: 22px;
      overflow: hidden;
      color: var(--text-main);
      background: radial-gradient(circle at 50% 18%, rgba(94, 224, 164, 0.09), transparent 42%), linear-gradient(180deg, rgba(18, 38, 55, 0.98), rgba(7, 19, 31, 0.99));
      border: 1px solid rgba(94, 224, 164, 0.18);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      text-decoration: none;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .result-card:hover {
      transform: translateY(-3px);
      border-color: rgba(94, 224, 164, 0.36);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32), 0 0 28px rgba(94, 224, 164, 0.12);
    }

    .result-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      margin-bottom: 18px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 800;
    }

    .result-round {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap !important;
    }

    .result-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      color: #f8fafc;
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .result-scoreboard {
      display: grid;
      gap: 12px;
      width: 100%;
      margin: 4px 0 14px;
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .result-side {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .result-side img,
    .result-logo-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.08);
      padding: 6px;
      flex: 0 0 42px;
    }

    .result-logo-placeholder {
      display: block;
    }

    .result-side span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap !important;
      color: var(--text-main);
      font-size: 15px;
      line-height: 1.2;
      font-weight: 900;
    }

    .result-goals {
      min-width: 32px;
      color: var(--text-main);
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
      text-align: right;
      white-space: nowrap !important;
    }

    .result-penalty {
      width: fit-content;
      max-width: 100%;
      margin: 0 0 10px;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.06);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap !important;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-card-bottom {
      display: grid;
      gap: 4px;
      margin-top: auto;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.35;
      min-width: 0;
    }

    .result-card-bottom span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap !important;
      text-align: left !important;
    }

    .result-date {
      opacity: 0.86;
    }

    .results-empty {
      grid-column: 1 / -1;
      padding: 24px;
      border-radius: 20px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(94, 224, 164, 0.18);
      line-height: 1.55;
    }

    @media (max-width: 1100px) {
      .results-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .results-page-wrap {
        width: calc(100% - 16px);
        padding: 18px 0 44px;
      }

      .results-page-section {
        padding: 16px 12px;
      }

      .results-head {
        flex-direction: column;
      }

      .results-head span {
        text-align: left;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .result-card {
        min-height: 210px;
        padding: 16px;
      }

      .result-side img,
      .result-logo-placeholder {
        width: 38px;
        height: 38px;
        flex-basis: 38px;
      }

      .result-side span {
        font-size: 14px;
      }

      .result-goals {
        font-size: 25px;
      }
    }
  </style>
</head>

<body class="theme-dark">

<header class="header">
  <div class="header-inner">

    <a class="bf-logo" href="/" aria-label="Betforecast.ai home">
      <img src="assets/bet-logo.png" alt="Betforecast.ai logo">
      <span>Betforecast<span>.ai</span></span>
    </a>

    <nav class="topbar-menu" aria-label="Main navigation">
      <a href="world-cup-2026.html">🏆 WC 2026</a>
      <a href="news.html">News</a>
      <a href="standings.html">Standings</a>
      <a href="match.html">Matches</a>
      <a href="results.html" class="active">Results</a>
      <a href="ai-insights.html">AI Insights</a>
    </nav>

    <div class="topbar-actions">
      <button class="theme-switch" id="theme-toggle" type="button" aria-label="Toggle theme">
        <span class="theme-switch-track"><span class="theme-switch-thumb"></span></span>
        <span class="theme-switch-label">Dark</span>
      </button>
    </div>

  </div>
</header>

<main class="results-page-wrap">

  <section class="ai-focus-banner ai-focus-banner-compact results-hero">
    <div class="ai-focus-content">
      <div class="ai-focus-text">
        <span class="hero-ai-badge">World Cup Results</span>
        <h1>Latest World Cup 2026 results.</h1>
        <p>Follow final scores, recent outcomes, and team results from the FIFA World Cup 2026.</p>
      </div>
    </div>
  </section>

  <section class="results-page-section">
    <div class="results-head">
      <h2>World Cup Match Results</h2>
      <span id="results-status">Loading World Cup results...</span>
    </div>

    <div id="results-grid" class="results-grid"></div>
  </section>

</main>

<script src="/api-config.js"></script>
<script src="/js/results.js?v=7"></script>

<script>
(function () {
  const body = document.body;
  const toggle = document.getElementById("theme-toggle");
  const label = toggle ? toggle.querySelector(".theme-switch-label") : null;

  function applyTheme(theme) {
    body.classList.remove("theme-dark", "theme-glass", "theme-light");
    if (theme === "glass") {
      body.classList.add("theme-glass");
    } else {
      body.classList.add("theme-dark");
    }
    localStorage.setItem("bf-theme", theme);
    if (label) label.textContent = theme === "glass" ? "Glass" : "Dark";
  }

  const savedTheme = localStorage.getItem("bf-theme") || "dark";
  applyTheme(savedTheme);

  if (toggle) {
    toggle.addEventListener("click", function () {
      const nextTheme = body.classList.contains("theme-dark") ? "glass" : "dark";
      applyTheme(nextTheme);
    });
  }
})();
</script>

</body>
</html>
