<header class="header">

    <div class="topbar-actions">
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
    Glass
  </button>

</div>
  </div>

<main style="max-width: 1280px; margin: 0 auto; padding: 40px 20px 80px;">
  <section class="ai-focus-banner ai-focus-banner-compact">
    <div class="ai-focus-glow"></div>
    <div class="ai-focus-shine"></div>

    <div class="ai-focus-content">
      <div class="ai-focus-text">
        <span class="hero-ai-badge">MATCH RESULTS</span>
        <h3>Latest football results in one place.</h3>
        <p>
          Follow final scores, recent outcomes, and match result summaries
          across major competitions.
        </p>
      </div>
    </div>
  </section>

  <section style="margin-top: 28px;">
    <div id="results-page-container" class="matches-grid"></div>
  </section>
</main>

<script src="js/results.js"></script>
<script>
  (function () {
    const savedTheme = localStorage.getItem("bf-theme") || "dark";
    document.body.classList.add(`theme-${savedTheme}`);

    const toggleBtn = document.getElementById("theme-toggle");
    if (!toggleBtn) return;

    function updateButton(theme) {
      toggleBtn.textContent = theme === "dark" ? "Glass" : "Dark";
    }

    updateButton(savedTheme);

    toggleBtn.addEventListener("click", function () {
      const isDark = document.body.classList.contains("theme-dark");

      document.body.classList.remove("theme-dark", "theme-glass");

      const nextTheme = isDark ? "glass" : "dark";
      document.body.classList.add(`theme-${nextTheme}`);
      localStorage.setItem("bf-theme", nextTheme);
      updateButton(nextTheme);
    });
  })();
</script>
  <!-- твои другие скрипты -->

  <script>
    (function () {
      const savedTheme = localStorage.getItem("bf-theme") || "dark";
      document.body.classList.add(`theme-${savedTheme}`);

      const toggle = document.getElementById("theme-toggle");
      const label = toggle?.querySelector(".theme-switch-label");

      function updateUI(theme) {
        if (label) {
          label.textContent = theme === "dark" ? "Dark" : "Glass";
        }
      }

      updateUI(savedTheme);

      toggle?.addEventListener("click", () => {
        const isDark = document.body.classList.contains("theme-dark");

        document.body.classList.remove("theme-dark", "theme-glass");

        const next = isDark ? "glass" : "dark";
        document.body.classList.add(`theme-${next}`);
        localStorage.setItem("bf-theme", next);

        updateUI(next);
      });
    })();
  </script>

</body>
