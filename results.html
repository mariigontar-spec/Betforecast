<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betforecast.ai | Results</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <div class="header-inner">
      <a class="site-logo" href="index.html" aria-label="Betforecast.ai home">
        <img class="site-logo__icon" src="assets/bet-logo.png" alt="Betforecast.ai logo">
        <span class="site-logo__text">Betforecast<span class="logo-accent">.ai</span></span>
      </a>

      <nav class="topbar-menu" aria-label="Main navigation">
        <a href="news.html">News</a>
        <a href="standings.html">Standings</a>
        <a href="match.html">Matches</a>
        <a href="results.html" class="active">Results</a>
        <a href="ai-insights.html">AI Insights</a>
      </nav>

      <div class="topbar-actions">
        <button class="theme-switch" id="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="theme-switch-track">
            <span class="theme-switch-thumb"></span>
          </span>
          <span class="theme-switch-label">Dark</span>
        </button>

        <a href="#" class="btn-bf-ghost">Sign In</a>
      </div>
    </div>
  </header>

  <main class="match-page-wrap page-shell">
    <section class="ai-focus-banner ai-focus-banner-compact">
      <div class="ai-focus-content">
        <div class="ai-focus-text">
          <span class="hero-ai-badge">Match Results</span>

          <h1>Latest football results in one place.</h1>

          <p>
            Follow final scores, recent outcomes, and match result summaries
            across major competitions.
          </p>
        </div>
      </div>
    </section>

    <section class="results-page-section">
      <div id="results-page-container" class="matches-grid"></div>
    </section>
  </main>

  <script src="js/results.js"></script>

  <script>
    (function () {
      const savedTheme = localStorage.getItem("bf-theme") || "dark";
      document.body.classList.remove("theme-dark", "theme-glass");
      document.body.classList.add(`theme-${savedTheme}`);

      const toggle = document.getElementById("theme-toggle");
      const label = toggle ? toggle.querySelector(".theme-switch-label") : null;

      function updateLabel(theme) {
        if (!label) return;
        label.textContent = theme === "dark" ? "Dark" : "Glass";
      }

      updateLabel(savedTheme);

      if (toggle) {
        toggle.addEventListener("click", function () {
          const savedTheme = localStorage.getItem("bf-theme") || "light";

document.body.classList.remove("theme-dark", "theme-glass", "theme-light");
document.body.classList.add(`theme-${savedTheme}`);

          localStorage.setItem("bf-theme", nextTheme);
          updateLabel(nextTheme);
        });
      }
    })();

    document.addEventListener("DOMContentLoaded", function () {
      const resultsContainer = document.getElementById("results-page-container");

      if (!resultsContainer) return;

      resultsContainer.addEventListener("click", function (event) {
        const card = event.target.closest(".match-card, article, .result-card, .results-card, .match-result-card");

        if (!card || !resultsContainer.contains(card)) return;

        window.location.href = "match.html";
      });

      resultsContainer.addEventListener("keydown", function (event) {
        if (event.key !== "Enter" && event.key !== " ") return;

        const card = event.target.closest(".match-card, article, .result-card, .results-card, .match-result-card");

        if (!card || !resultsContainer.contains(card)) return;

        event.preventDefault();
        window.location.href = "match.html";
      });

      const observer = new MutationObserver(function () {
        const cards = resultsContainer.querySelectorAll(".match-card, article, .result-card, .results-card, .match-result-card");

        cards.forEach(function (card) {
          card.style.cursor = "pointer";
          card.setAttribute("tabindex", "0");
          card.setAttribute("role", "button");
        });
      });

      observer.observe(resultsContainer, {
        childList: true,
        subtree: true
      });
    });
  </script>
  <script>
  (function () {
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const label = toggle ? toggle.querySelector("b") : null;

    function applyTheme(theme) {
      body.classList.remove("theme-dark", "theme-glass", "theme-light");

      if (theme === "dark") {
        body.classList.add("theme-dark");
      } else {
        body.classList.add("theme-glass");
      }

      localStorage.setItem("bf-theme", theme);

      if (label) {
        label.textContent = theme === "dark" ? "Dark" : "Glass";
      }
    }

    const savedTheme = localStorage.getItem("bf-theme") || "glass";
    applyTheme(savedTheme);

    if (toggle) {
      toggle.addEventListener("click", function () {
        const nextTheme = body.classList.contains("theme-dark") ? "glass" : "dark";
        applyTheme(nextTheme);
      });
    }
  })();
</script>
</body>
</html>
