<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betforecast.ai | World Cup 2026 Results</title>
  <link rel="stylesheet" href="css/style.css?v=26">
  <script src="https://cdn.counter.dev/script.js" data-id="1a42378c-7a8a-4f3e-8296-a7a9f8655098" data-utcoffset="3"></script>

  <style>
    :root {
      --bg: #020b13;
      --panel: linear-gradient(180deg, rgba(18,38,55,.96), rgba(8,20,32,.98));
      --soft: rgba(2,11,19,.44);
      --green: #5ee0a4;
      --green-2: #b7ffcf;
      --border: 1px solid rgba(94,224,164,.16);
      --text: #f8fafc;
      --muted: rgba(248,250,252,.68);
      --shell: 1240px;
      --gap: 48px;
    }

    * { box-sizing: border-box; min-width: 0; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: var(--bg) !important;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body.site-skin-1win { padding-top: 240px !important; }

    a { color: inherit; text-decoration: none; }

    .bf-adserver-background {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 1px;
    }

    .bf-header,
    .bf-page,
    .side-banner,
    .results-leaderboard-ad,
    .results-box-ad {
      position: relative !important;
      z-index: 20 !important;
    }

    .bf-header { width: 100%; }

    .bf-header-inner {
      width: min(var(--shell), calc(100vw - var(--gap)));
      min-height: 82px;
      margin: 0 auto;
      padding: 14px 24px;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 220px;
      align-items: center;
      gap: 18px;
      background: var(--panel);
      border: var(--border);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0,0,0,.32);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .bf-header-inner::after {
      content: "";
      display: block;
      width: 220px;
      height: 1px;
    }

    .bf-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .bf-logo img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .bf-logo span span { color: var(--green); }

    .bf-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .bf-nav a {
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(94,224,164,.12);
      background: rgba(255,255,255,.04);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .bf-nav a:hover,
    .bf-nav a.active {
      color: var(--green);
      border-color: rgba(94,224,164,.46);
      box-shadow: 0 0 18px rgba(94,224,164,.16);
      background: rgba(94,224,164,.10);
    }

    .bf-page {
      width: min(var(--shell), calc(100vw - var(--gap))) !important;
      max-width: var(--shell) !important;
      margin: 28px auto 0 !important;
      padding: 0 0 56px !important;
      display: grid !important;
      grid-template-columns: 1fr !important;
      gap: 24px !important;
      justify-items: stretch !important;
      align-items: start !important;
    }

    .results-hero,
    .results-panel {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      min-width: 0;
      background: var(--panel);
      border: var(--border);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0,0,0,.26);
      color: var(--text);
      overflow: hidden;
    }

    .results-hero {
      min-height: 210px;
      padding: 42px 56px;
      display: flex;
      align-items: center;
    }

    .hero-ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(94,224,164,.18);
      background: rgba(94,224,164,.08);
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .results-hero h1 {
      margin: 18px 0 12px;
      color: #fff;
      font-size: clamp(42px, 5vw, 60px);
      line-height: 1;
      letter-spacing: -.05em;
    }

    .results-hero p {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .results-leaderboard-ad,
    .results-box-ad {
      width: 100% !important;
      max-width: 100% !important;
      min-height: 90px;
      margin: 0 auto !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      overflow: visible !important;
    }

    .results-box-ad { display: none !important; }

    .banner-728 {
      width: 728px !important;
      max-width: 728px !important;
      height: 90px !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      margin: 0 auto !important;
      overflow: hidden !important;
    }

    .banner-728 > .ins-zone,
    .banner-728 ins,
    .banner-728 iframe,
    .banner-728 .ins-zone > * {
      display: block !important;
      float: none !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    .banner-728 > .ins-zone {
      width: 728px !important;
      height: 90px !important;
    }

    .results-panel {
      padding: 24px;
    }

    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 22px;
    }

    .results-head h2 {
      margin: 0;
      color: #fff;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -.05em;
    }

    .results-head span {
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      color: rgba(248,250,252,.72);
      background: rgba(255,255,255,.045);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .wc-results-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .wc-result-card,
    .wc-result-card * {
      writing-mode: horizontal-tb !important;
      text-orientation: mixed !important;
      word-break: normal !important;
      overflow-wrap: normal !important;
      hyphens: none !important;
      box-sizing: border-box !important;
    }

    .wc-result-card {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr) 96px;
      align-items: center;
      gap: 18px;
      min-height: 124px;
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid rgba(94,224,164,.18);
      background: radial-gradient(circle at 8% 0%, rgba(94,224,164,.08), transparent 36%), rgba(2,11,19,.42);
      color: #fff;
      overflow: hidden;
    }

    .wc-result-round {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .wc-status-pill,
    .wc-penalty-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 7px 11px;
      border-radius: 999px;
      color: #fff;
      background: rgba(255,255,255,.08);
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .wc-score-stack {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .wc-team-line {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 36px;
      align-items: center;
      gap: 10px;
      height: 42px;
      padding: 0 10px 0 0;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
    }

    .wc-team-line img,
    .wc-logo-placeholder {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      padding: 6px;
      object-fit: contain;
      background: rgba(255,255,255,.08);
    }

    .wc-logo-placeholder { display: block; }

    .wc-team-line span {
      overflow: hidden;
      color: #fff;
      font-size: 16px;
      font-weight: 950;
      line-height: 1.1;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .wc-team-line b {
      color: #fff;
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
      text-align: right;
      white-space: nowrap;
    }

    .wc-result-meta {
      display: grid;
      gap: 8px;
      justify-items: end;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      text-align: right;
    }

    .wc-result-meta span {
      max-width: 96px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wc-empty {
      grid-column: 1 / -1;
      padding: 22px;
      border-radius: 20px;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      border: 1px dashed rgba(94,224,164,.22);
      line-height: 1.5;
    }

    .side-banner {
      position: fixed !important;
      top: 400px !important;
      z-index: 30 !important;
    }

    .left-banner { left: 24px !important; }
    .right-banner { right: 24px !important; }

    @media (max-width: 1100px) {
      .bf-header-inner {
        grid-template-columns: 1fr;
        justify-items: center;
      }
      .bf-header-inner::after { display: none; }
      .bf-nav { width: 100%; flex-wrap: wrap; }
      .wc-results-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      body.site-skin-1win { padding-top: 150px !important; }
      .side-banner,
      .results-leaderboard-ad,
      .banner-728 { display: none !important; }
      .bf-header-inner {
        width: calc(100% - 16px);
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        border-radius: 18px;
      }
      .bf-logo { justify-content: center; font-size: 20px; }
      .bf-logo img { width: 30px; height: 30px; }
      .bf-nav {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }
      .bf-nav a {
        width: 100%;
        padding: 9px 4px;
        font-size: 12px;
        text-align: center;
        white-space: normal;
      }
      .bf-page {
        width: calc(100% - 16px) !important;
        margin-top: 12px !important;
      }
      .results-hero,
      .results-panel {
        padding: 18px 12px;
        border-radius: 22px;
      }
      .results-hero h1 { font-size: 32px; }
      .results-hero p { font-size: 15px; }
      .results-head { flex-direction: column; align-items: flex-start; }
      .results-head span { white-space: normal; }
      .wc-result-card {
        grid-template-columns: 1fr;
        gap: 14px;
        min-height: 0;
      }
      .wc-result-round {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .wc-result-meta { justify-items: start; text-align: left; }
      .wc-result-meta span { max-width: 100%; }
      .results-box-ad,
      .adhit-300x250 {
        display: flex !important;
        justify-content: center;
        width: 100%;
        margin: 18px auto;
        overflow: hidden;
      }
    }
  </style>
</head>
