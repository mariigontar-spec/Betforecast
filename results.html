<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betforecast.ai | World Cup 2026 Results</title>
  <link rel="stylesheet" href="css/style.css?v=22">

  <script src="https://cdn.counter.dev/script.js" data-id="1a42378c-7a8a-4f3e-8296-a7a9f8655098" data-utcoffset="3"></script>

  <style>
    :root {
      --page-max: 1240px;
      --content-max: 1040px;
      --bg: #020b13;
      --panel: linear-gradient(180deg, rgba(18, 38, 55, .96), rgba(7, 19, 31, .98));
      --border: 1px solid rgba(94, 224, 164, .16);
      --green: #5ee0a4;
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, .72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body.site-skin-1win {
      padding-top: 190px;
      background-image: url("/assets/ads/1win-wc2026-site-skin.webp");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: 1920px auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .skin-click {
      position: fixed;
      z-index: 2;
      display: block;
    }

    .skin-click-top {
      top: 0;
      left: 50%;
      width: min(100vw, 1920px);
      height: 165px;
      transform: translateX(-50%);
    }

    .skin-click-left,
    .skin-click-right {
      top: 165px;
      bottom: 0;
      width: max(0px, calc((100vw - var(--page-max)) / 2));
      max-width: 320px;
    }

    .skin-click-left {
      left: 0;
    }

    .skin-click-right {
      right: 0;
    }

    .header,
    .results-page {
      position: relative;
      z-index: 20;
    }

    .header-inner {
      width: min(var(--content-max), calc(100vw - 48px));
      margin: 0 auto;
      min-height: 82px;
      padding: 14px 24px;
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      background: var(--panel);
      border: var(--border);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .32);
      backdrop-filter: blur(14px);
    }

    .bf-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .bf-logo img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .bf-logo span span {
      color: var(--green);
    }

    .topbar-menu {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar-menu a {
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .topbar-menu a.active,
    .topbar-menu a:hover {
      color: var(--green);
      background: rgba(94, 224, 164, .12);
      border-color: rgba(94, 224, 164, .34);
    }

    .results-page {
      width: min(var(--page-max), calc(100vw - 48px));
      margin: 28px auto 0;
      padding-bottom: 52px;
      display: grid;
      gap: 28px;
    }

    .results-hero,
    .results-section {
      width: min(var(--content-max), 100%);
      margin: 0 auto;
      background: var(--panel);
      border: var(--border);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .28);
    }

    .results-hero {
      min-height: 220px;
      padding: 48px 64px;
      display: flex;
      align-items: center;
    }

    .hero-ai-badge {
      display: inline-flex;
      width: fit-content;
      padding: 9px 15px;
      border-radius: 999px;
      color: #d9fff0;
      background: rgba(94, 224, 164, .14);
      border: 1px solid rgba(94, 224, 164, .28);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .results-hero h1 {
      margin: 16px 0 10px;
      color: #fff;
      font-size: clamp(34px, 4vw, 54px);
      line-height: 1;
      letter-spacing: -.05em;
    }

    .results-hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .content-banner {
      width: 100%;
      min-height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      padding: 0;
      background: transparent;
      border: 0;
      overflow: visible;
    }

    .banner-728,
    .content-banner-desktop {
      width: 728px;
      height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      overflow: hidden;
    }

    .banner-728 > .ins-zone {
      display: block;
      width: 728px;
      height: 90px;
      margin: 0 auto;
    }

    .content-banner-mobile {
      display: none;
    }

    .results-section {
      padding: 26px;
    }

    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .results-head h2 {
      margin: 0;
      color: #fff;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -.04em;
    }

    .results-head span {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      width: min(960px, 100%);
      margin: 0 auto;
    }

    .result-card {
      display: flex;
      flex-direction: column;
      min-height: 176px;
      padding: 18px;
      border-radius: 20px;
      color: var(--text);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(18, 38, 55, .98), rgba(7, 19, 31, .99));
      border: 1px solid rgba(94, 224, 164, .18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
      overflow: hidden;
    }

    .result-card-top,
    .result-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .result-card-top {
      margin-bottom: 14px;
      font-weight: 800;
    }

    .result-card-bottom {
      margin-top: auto;
    }

    .result-status {
      min-width: 44px;
      min-height: 30px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 0 11px;
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, .08);
      font-size: 12px;
      font-weight: 900;
    }

    .result-scoreboard {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      align-items: center;
      gap: 12px;
    }

    .result-side {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .result-side img,
    .result-logo-placeholder {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border-radius: 50%;
      object-fit: contain;
      padding: 6px;
      background: rgba(255, 255, 255, .08);
    }

    .result-logo-placeholder {
      display: block;
    }

    .result-side span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    .result-goals {
      color: #fff;
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
      text-align: right;
    }

    .result-penalty {
      width: fit-content;
      max-width: 100%;
      margin: 0 0 10px;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .06);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .results-empty {
      grid-column: 1 / -1;
      padding: 24px;
      border-radius: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, .04);
      border: 1px dashed rgba(94, 224, 164, .2);
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      body.site-skin-1win {
        padding-top: 115px;
        background-size: auto 330px;
      }

      .skin-click-left,
      .skin-click-right {
        display: none;
      }

      .skin-click-top {
        height: 96px;
      }

      .header-inner,
      .results-page {
        width: calc(100% - 16px);
      }

      .header-inner {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 12px 10px;
        border-radius: 18px;
      }

      .topbar-menu {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .topbar-menu a {
        padding: 10px 4px;
        font-size: 12px;
        text-align: center;
      }

      .results-hero {
        min-height: 0;
        padding: 24px 16px;
        border-radius: 22px;
      }

      .results-hero h1 {
        font-size: 34px;
      }

      .results-hero p {
        font-size: 15px;
      }

      .results-section {
        padding: 16px 12px;
      }

      .results-head {
        flex-direction: column;
      }

      .results-head span {
        text-align: left;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .content-banner {
        min-height: 250px;
      }

      .content-banner-desktop {
        display: none;
      }

      .content-banner-mobile,
      .adhit-300x250 {
        width: 300px;
        height: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto;
        overflow: hidden;
      }

      .adhit-300x250 > .ins-zone {
        display: block;
        width: 300px;
        height: 250px;
        margin: 0 auto;
      }
    }
  </style>
</head>
