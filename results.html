<script>
document.addEventListener("DOMContentLoaded", function () {

  const resultsContainer =
    document.getElementById("results-page-container");

  if (!resultsContainer) return;

  function makeCardsInteractive() {

    const cards = resultsContainer.querySelectorAll(
      ".match-card, article, .result-card, .results-card, .match-result-card"
    );

    cards.forEach(function (card) {

      card.style.cursor = "pointer";

      card.setAttribute("tabindex", "0");
      card.setAttribute("role", "button");
      card.setAttribute("aria-label", "Open match analysis");

    });
  }

  resultsContainer.addEventListener("click", function (event) {

    const card = event.target.closest(
      ".match-card, article, .result-card, .results-card, .match-result-card"
    );

    if (!card || !resultsContainer.contains(card)) return;

    window.location.href = "match.html";

  });

  resultsContainer.addEventListener("keydown", function (event) {

    if (event.key !== "Enter" && event.key !== " ") return;

    const card = event.target.closest(
      ".match-card, article, .result-card, .results-card, .match-result-card"
    );

    if (!card || !resultsContainer.contains(card)) return;

    event.preventDefault();

    window.location.href = "match.html";

  });

  makeCardsInteractive();

  const observer = new MutationObserver(makeCardsInteractive);

  observer.observe(resultsContainer, {
    childList: true,
    subtree: true
  });

});
</script>

<script>
(function () {

  const body = document.body;

  const toggle =
    document.getElementById("theme-toggle");

  const label =
    toggle
    ? toggle.querySelector(".theme-switch-label")
    : null;

  function applyTheme(theme) {

    body.classList.remove(
      "theme-dark",
      "theme-glass",
      "theme-light"
    );

    if (theme === "dark") {
      body.classList.add("theme-dark");
    } else {
      body.classList.add("theme-glass");
    }

    localStorage.setItem("bf-theme", theme);

    if (label) {
      label.textContent =
        theme === "dark"
        ? "Dark"
        : "Glass";
    }
  }

  const savedTheme =
    localStorage.getItem("bf-theme") || "glass";

  applyTheme(savedTheme);

  if (toggle) {

    toggle.addEventListener("click", function () {

      const nextTheme =
        body.classList.contains("theme-dark")
        ? "glass"
        : "dark";

      applyTheme(nextTheme);

    });
  }

})();
</script>
