<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betforecast.ai | World Cup 2026 Results</title>
  <link rel="stylesheet" href="css/style.css?v=22">
  <script src="https://cdn.counter.dev/script.js" data-id="1a42378c-7a8a-4f3e-8296-a7a9f8655098" data-utcoffset="3"></script>

  <style>
    :root {
      --bf-bg: #020b13;
      --bf-green: #5ee0a4;
      --bf-text: #f8fafc;
      --bf-muted: rgba(248, 250, 252, .68);
      --bf-panel: linear-gradient(180deg, rgba(18, 38, 55, .97), rgba(8, 20, 32, .98));
      --bf-border: 1px solid rgba(94, 224, 164, .16);
      --bf-shell: 1240px;
      --bf-content: 1040px;
    }

    * { box-sizing: border-box; min-width: 0; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bf-bg) !important;
      color: var(--bf-text);
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.site-skin-1win {
      min-height: 100vh;
      padding-top: 190px !important;
      background-color: var(--bf-bg) !important;
      background-image: url("/assets/ads/1win-wc2026-site-skin.webp") !important;
      background-repeat: no-repeat !important;
      background-position: center top !important;
      background-size: 1920px auto !important;
      background-attachment: scroll !important;
    }

    a { color: inherit; text-decoration: none; }

    .header {
      position: relative !important;
      z-index: 30 !important;
      width: 100%;
      margin: 0;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    .header-inner {
      width: min(var(--bf-content), calc(100vw - 48px));
      min-height: 82px;
      margin: 0 auto;
      padding: 14px 24px;
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      align-items: center;
      gap: 18px;
      background: var(--bf-panel);
      border: var(--bf-border);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .32);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .bf-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .bf-logo img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .bf-logo span span { color: var(--bf-green); }

    .topbar-menu {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 10px;
    }

    .topbar-menu a {
      flex: 0 0 auto;
      padding: 11px 15px;
      border-radius: 14px;
      color: #fff;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .12);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .topbar-menu a.active {
      color: var(--bf-green);
      background: rgba(94, 224, 164, .12);
      border-color: rgba(94, 224, 164, .35);
    }

    .results-page-wrap {
      position: relative;
      z-index: 20;
      width: min(var(--bf-shell), calc(100vw - 48px));
      margin: 28px auto 0;
      padding-bottom: 56px;
      display: grid;
      gap: 28px;
    }

    .results-hero,
    .results-page-section {
      width: min(var(--bf-content), 100%);
      margin: 0 auto;
      border-radius: 28px;
      background: var(--bf-panel);
      border: var(--bf-border);
      box-shadow: 0 18px 50px rgba(0, 0, 0, .28);
      overflow: hidden;
    }

    .results-hero {
      min-height: 230px;
      padding: 42px;
      display: flex;
      align-items: center;
    }

    .hero-ai-badge {
      display: inline-flex;
      width: fit-content;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(94, 224, 164, .12);
      border: 1px solid rgba(94, 224, 164, .26);
      color: var(--bf-green);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .results-hero h1 {
      margin: 18px 0 10px;
      color: #fff;
      font-size: clamp(36px, 4vw, 54px);
      line-height: 1;
      letter-spacing: -.055em;
    }

    .results-hero p {
      max-width: 760px;
      margin: 0;
      color: var(--bf-muted);
      font-size: 18px;
      line-height: 1.45;
    }

    .content-banner {
      width: 100%;
      min-height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      padding: 0;
      background: transparent;
      border: 0;
      overflow: visible;
    }

    .content-banner-desktop,
    .banner-728 {
      width: 728px;
      height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      padding: 0;
      overflow: hidden;
    }

    .banner-728 > .ins-zone {
      display: block;
      width: 728px;
      height: 90px;
      margin: 0 auto;
      padding: 0;
    }

    .results-page-section { padding: 28px; }

    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 20px;
    }

    .results-head h2 {
      margin: 0;
      color: #fff;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -.045em;
    }

    .results-head span {
      color: var(--bf-muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .wc-results-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .wc-result-card,
    .wc-result-card * {
      writing-mode: horizontal-tb !important;
      text-orientation: mixed !important;
      word-break: normal !important;
      overflow-wrap: normal !important;
      hyphens: none !important;
      box-sizing: border-box !important;
    }

    .wc-result-card {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr) 96px;
      align-items: center;
      gap: 18px;
      min-height: 124px;
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid rgba(94, 224, 164, .18);
      background: radial-gradient(circle at 8% 0%, rgba(94, 224, 164, .08), transparent 36%), rgba(2, 11, 19, .42);
      color: #fff;
      overflow: hidden;
    }

    .wc-result-round {
      display: grid;
      gap: 8px;
      color: var(--bf-muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .wc-status-pill,
    .wc-penalty-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 7px 11px;
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, .08);
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .wc-score-stack {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .wc-team-line {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 36px;
      align-items: center;
      gap: 10px;
      height: 42px;
      padding: 0 10px 0 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .wc-team-line img,
    .wc-logo-placeholder {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      padding: 6px;
      object-fit: contain;
      background: rgba(255, 255, 255, .08);
    }

    .wc-logo-placeholder { display: block; }

    .wc-team-line span {
      overflow: hidden;
      color: #fff;
      font-size: 16px;
      font-weight: 950;
      line-height: 1.1;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .wc-team-line b {
      color: #fff;
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
      text-align: right;
      white-space: nowrap;
    }

    .wc-result-meta {
      display: grid;
      gap: 8px;
      justify-items: end;
      color: var(--bf-muted);
      font-size: 12px;
      line-height: 1.25;
      text-align: right;
    }

    .wc-result-meta span {
      max-width: 96px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wc-empty {
      grid-column: 1 / -1;
      padding: 22px;
      border-radius: 20px;
      color: var(--bf-muted);
      background: rgba(255, 255, 255, .04);
      border: 1px dashed rgba(94, 224, 164, .22);
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .header-inner {
        grid-template-columns: 1fr;
        justify-items: center;
      }
      .topbar-menu { flex-wrap: wrap; }
      .wc-results-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      body.site-skin-1win {
        padding-top: 98px !important;
        background-image: linear-gradient(180deg, rgba(2,11,19,0) 0, rgba(2,11,19,.14) 96px, rgba(2,11,19,.88) 240px, #020b13 330px), url('/assets/ads/1win-wc2026-site-skin.webp') !important;
        background-size: 100% 340px, auto 290px !important;
      }

      .header-inner,
      .results-page-wrap { width: calc(100% - 16px); }

      .header-inner {
        min-height: 0;
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-radius: 18px;
      }

      .topbar-menu {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .topbar-menu a {
        width: 100%;
        padding: 10px 3px;
        border-radius: 13px;
        font-size: 13px;
        text-align: center;
      }

      .results-page-wrap { margin-top: 14px; gap: 18px; }

      .results-hero,
      .results-page-section { width: 100%; border-radius: 22px; }

      .results-hero { min-height: 0; padding: 22px 16px; }
      .results-hero h1 { font-size: 34px; }
      .results-hero p { font-size: 15px; }

      .content-banner,
      .banner-728,
      .content-banner-desktop {
        display: none !important;
      }

      .results-page-section { padding: 18px 12px; }
      .results-head { flex-direction: column; }
      .results-head span { text-align: left; }

      .wc-result-card {
        grid-template-columns: 1fr;
        gap: 14px;
        min-height: 0;
      }

      .wc-result-round {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .wc-result-meta { justify-items: start; text-align: left; }
      .wc-result-meta span { max-width: 100%; }
    }
  </style>
</head>

<body class="theme-dark site-skin-1win">
  <header class="header">
    <div class="header-inner">
      <a class="bf-logo" href="/" aria-label="Betforecast.ai home">
        <img src="assets/bet-logo.png" alt="Betforecast.ai logo">
        <span>Betforecast<span>.ai</span></span>
      </a>

      <nav class="topbar-menu" aria-label="Main navigation">

        <a href="news.html">News</a>

    <div id="results-top-728-ad" class="content-banner">

      <div>

        <h1>Latest World Cup 2026 results.</h1>

    <section class="results-page-section">
      <div class="results-head">

        <span id="results-status">Loading World Cup results...</span>

    </section>
  </main>

  <script src="/api-config.js"></script>
  <script src="/js/results.js?v=21"></script>
  <script data-cfasync="false" async src="https://media.getads.online/js/code.min.js"></script>
</body>
</html>
